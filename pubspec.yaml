name: voltwatch
description: "Battery Management & Analytics Utility"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Battery monitoring
  battery_plus: ^6.2.0

  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Settings storage
  shared_preferences: ^2.5.3

  # Notifications
  flutter_local_notifications: ^19.2.1

  # Background processing
  workmanager: ^0.9.0

  # Audio
  audioplayers: ^6.0.0

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  intl: ^0.20.2
  permission_handler: ^11.4.0
  csv: ^6.0.0
  share_plus: ^10.0.0
  path_provider: ^2.1.2

  # PDF Generation
  pdf: ^3.10.7

  # Device Info
  device_info_plus: ^10.1.0

  # Home Screen Widget
  home_widget: ^0.7.0
  app_usage: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#F8FAFC"
  color_dark: "#0D0E11"
  image: "assets/icon/app_icon.png"
  image_dark: "assets/icon/app_icon.png"
  
  android_12:
    color: "#F8FAFC"
    color_dark: "#0D0E11"
    image: "assets/icon/app_icon.png"
    image_dark: "assets/icon/app_icon.png"
    
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
